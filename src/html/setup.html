{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Setup Your Account</h2>
                    <p class="text-center text-muted mb-4">Card ID: <code>{{ card_id }}</code></p>
                    
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}
                    
                    <form hx-post="/setup" 
                            hx-target="#setup-message" 
                            hx-swap="innerHTML"
                            hx-on="htmx:responseError: document.getElementById('setup-message').innerHTML = event.detail.xhr.responseText">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
                            <small class="form-text text-muted">At least 6 characters</small>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">Name (display name)</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name display name" required autofocus>
                            <small class="form-text text-muted">At least 5 characters</small>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                            <small class="form-text text-muted">At least 6 characters</small>
                        </div>
                        <div class="mb-3">
                            <label for="confirm-password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Complete Setup</button>
                    </form>
                    <div id="setup-message" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
